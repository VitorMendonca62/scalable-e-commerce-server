volumes:
  postgres_data:
    driver: local

networks:
  api-net:
    driver: bridge

services:
  database:
    image: postgres:18-alpine
    container_name: database-products
    restart: always
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/data/db
    networks:
      - api-net
  api:
    container_name: scalable-e-commerce-products-api
    build: .
    ports:
      - "$PORT:$PORT"
    depends_on:
      - database
    restart: always
    networks:
      - api-net
    develop:
      watch:
        - action: rebuild
          path: .