volumes:
  postgres_data:
  redis_data:
    driver: local

networks:
  api-net:
    driver: bridge

services:
  database:
    image: postgres:18-alpine
    container_name: database-products-test
    restart: always
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/data/db
    networks:
      - api-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      retries: 10
      start_period: 5s
  redis:
      image: redis:7.2
      container_name: redis-products-test
      restart: always
      ports:
        - "${REDIS_PORT}:6379"
      command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1
      volumes:
        - redis_data:/data
      networks:
        - api-net
      healthcheck:
          test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
          interval: 5s
          retries: 10
          start_period: 5s