volumes:
  mongodb_data:
  redis_data:
    driver: local

networks:
  rabbit_connection_net:
    name: scalable-commerce-net-test
    driver: bridge
  api-net:
    driver: bridge

services:
  database:
    image: mongo:8.2.5
    container_name: database-auth-test
    restart: always
    ports:
      - "${MONGO_DB_PORT}:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_INITDB_DATABASE}
    volumes:
      - mongodb_data:/data/db
    networks:
      - api-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
      image: redis:7.2
      container_name: redis-auth-test
      restart: always
      ports:
        - "${REDIS_PORT}:6379"
      command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1
      volumes:
        - redis_data:/data
      networks:
        - api-net
      healthcheck:
        test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
        interval: 5s
        timeout: 3s
        retries: 5  

  message-broker:
    image: rabbitmq:3-management-alpine
    container_name: scalable-commerce-net-test
    restart: always
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "1${RABBITMQ_PORT}:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    networks:
      - rabbit_connection_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 5
  
