volumes:
  postgres_data:
    driver: local

networks:
  api-net:
    driver: bridge

services:
  database:
    image: postgres:18-alpine
    container_name: database-products
    restart: always
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/data/db
    networks:
      - api-net
  api:
    container_name: scalable-e-commerce-products-api
    build: .
    ports:
      - "$PORT:$PORT"
    depends_on:
      - database
    restart: always
    networks:
      - api-net
    develop:
      watch:
        - action: rebuild
          path: .
  redis:
      image: redis:7.2
      container_name: redis-products
      restart: always
      ports:
        - "6381:6379"
      command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1
      volumes:
        - redis_data:/data
      networks:
        - api-net